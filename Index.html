<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pace Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --warn: #ffcc00;
    --text: #e8e8f0;
    --muted: #555570;
    --ahead: #00ff88;
    --behind: #ff4466;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    box-shadow: none;
    transition: all 0.3s;
  }
  .status-dot.gps-ok { background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
  .status-dot.gps-warn { background: var(--warn); box-shadow: 0 0 12px var(--warn); }
  .status-dot.gps-err { background: var(--behind); box-shadow: 0 0 12px var(--behind); }

  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.4; }
  }

  /* SETUP PANEL */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .setup-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .input-field {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 10px 8px;
    width: 100%;
    text-align: center;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,255,136,0.1);
  }

  .duration-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  /* START BUTTON */
  .btn-start {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-start:hover { background: #00ffaa; box-shadow: 0 0 20px rgba(0,255,136,0.4); }
  .btn-start:active { transform: scale(0.98); }
  .btn-start:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; }

  .btn-stop {
    background: var(--behind);
  }
  .btn-stop:hover { background: #ff6688; box-shadow: 0 0 20px rgba(255,68,102,0.4); }

  /* RUNNING PANEL */
  .running-panel { display: none; }
  .running-panel.active { display: block; }
  .setup-panel.hidden { display: none; }

  /* BIG METRICS */
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    transition: background 0.3s;
  }

  .metric-card.card-ahead::before { background: var(--ahead); }
  .metric-card.card-behind::before { background: var(--behind); }
  .metric-card.card-neutral::before { background: var(--muted); }

  .metric-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .metric-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 1;
    color: var(--text);
    letter-spacing: 2px;
    transition: color 0.3s;
  }

  .metric-unit {
    font-size: 14px;
    color: var(--muted);
    margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
  }

  .metric-card.card-ahead .metric-value { color: var(--ahead); }
  .metric-card.card-behind .metric-value { color: var(--behind); }

  /* Secondary row */
  .secondary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .small-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .small-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .small-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--text);
  }

  /* PROGRESS BAR */
  .progress-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00ccff);
    border-radius: 3px;
    width: 0%;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px rgba(0,255,136,0.4);
  }

  /* NEXT ANNOUNCE */
  .announce-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .announce-icon { font-size: 16px; }
  .announce-countdown { color: var(--accent); font-weight: 700; }

  /* STOP BUTTON */
  .btn-stop-container {
    margin-top: 4px;
  }

  /* GPS STATUS BAR */
  .gps-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .gps-info { display: flex; align-items: center; gap: 8px; }
  .accuracy-val { color: var(--text); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #222233;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--accent);
    transition: transform 0.3s;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Wake lock indicator */
  .wake-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
  }
  .wake-indicator.active { background: var(--warn); box-shadow: 0 0 8px var(--warn); }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="logo">PACE TRACKER</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:10px;color:var(--muted);letter-spacing:1px" id="wakeLabel">VEILLE</span>
      <div class="wake-indicator" id="wakeIndicator"></div>
      <div class="status-dot" id="gpsDot" title="GPS"></div>
    </div>
  </div>

  <!-- SETUP -->
  <div class="setup-panel" id="setupPanel">
    <div class="setup-title">Configuration</div>

    <div class="input-row">
      <div class="input-group">
        <label class="input-label">Distance (m)</label>
        <input class="input-field" type="number" id="inputDistance" placeholder="5000" min="100" max="200000">
      </div>
      <div class="input-group">
        <label class="input-label">Durée (min)</label>
        <input class="input-field" type="number" id="inputDurMin" placeholder="30" min="0" max="999">
      </div>
      <div class="input-group">
        <label class="input-label">Durée (sec)</label>
        <input class="input-field" type="number" id="inputDurSec" placeholder="00" min="0" max="59">
      </div>
    </div>

    <div class="input-row" style="grid-template-columns:1fr">
      <div class="input-group">
        <label class="input-label">Annonce vocale (secondes)</label>
        <input class="input-field" type="number" id="inputTimer" placeholder="30" min="5" max="600">
      </div>
    </div>

    <button class="btn-start" id="btnStart" onclick="startTracking()">▶ DÉMARRER</button>

    <div id="setupError" style="margin-top:10px;font-size:11px;color:var(--behind);text-align:center;display:none"></div>
  </div>

  <!-- RUNNING -->
  <div class="running-panel" id="runningPanel">

    <div class="gps-bar">
      <div class="gps-info">
        <span>GPS</span>
        <span class="accuracy-val" id="gpsAccuracy">—</span>
      </div>
      <div class="gps-info">
        <span>POINTS</span>
        <span class="accuracy-val" id="gpsPoints">0</span>
      </div>
      <div class="gps-info">
        <span>VITESSE</span>
        <span class="accuracy-val" id="currentSpeed">—</span>
      </div>
    </div>

    <!-- Distance parcourue -->
    <div class="metrics-grid">
      <div class="metric-card card-neutral" id="cardDistance">
        <div class="metric-label">Distance parcourue</div>
        <div class="metric-value" id="valDistance">0<span class="metric-unit">m</span></div>
      </div>

      <div class="metric-card card-neutral" id="cardDeltaM">
        <div class="metric-label">Avance / Retard</div>
        <div class="metric-value" id="valDeltaM">—<span class="metric-unit">m</span></div>
      </div>

      <div class="metric-card card-neutral" id="cardDeltaT">
        <div class="metric-label">Avance / Retard temps</div>
        <div class="metric-value" id="valDeltaT">—<span class="metric-unit"></span></div>
      </div>
    </div>

    <div class="secondary-grid">
      <div class="small-card">
        <div class="small-label">Temps écoulé</div>
        <div class="small-value" id="valElapsed">00:00</div>
      </div>
      <div class="small-card">
        <div class="small-label">Temps restant</div>
        <div class="small-value" id="valRemaining">—</div>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-header">
        <span>Progression distance</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="announce-bar">
      <span class="announce-icon">🔊</span>
      <span>Prochaine annonce dans</span>
      <span class="announce-countdown" id="nextAnnounce">—</span>
      <span>sec</span>
    </div>

    <div class="btn-stop-container">
      <button class="btn-start btn-stop" onclick="stopTracking()">■ ARRÊTER</button>
    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
let state = {
  running: false,
  targetDistance: 0,
  targetDurationSec: 0,
  timerInterval: 30,

  startTime: 0,
  elapsedSec: 0,

  positions: [],
  totalDistance: 0,
  watchId: null,
  tickId: null,
  announceCountdown: 0,

  wakeLock: null,
};

// ============================================================
// UTILS
// ============================================================
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtTime(sec) {
  const s = Math.abs(Math.round(sec));
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function fmtTimeSpeech(sec) {
  const s = Math.abs(Math.round(sec));
  const m = Math.floor(s / 60);
  const ss = s % 60;
  if (m === 0) return `${ss} seconde${ss>1?'s':''}`;
  if (ss === 0) return `${m} minute${m>1?'s':''}`;
  return `${m} minute${m>1?'s':''} et ${ss} seconde${ss>1?'s':''}`;
}

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ============================================================
// WAKE LOCK
// ============================================================
async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      state.wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeIndicator').classList.add('active');
      document.getElementById('wakeLabel').textContent = 'ACTIF';
      state.wakeLock.addEventListener('release', () => {
        document.getElementById('wakeIndicator').classList.remove('active');
        document.getElementById('wakeLabel').textContent = 'VEILLE';
      });
    } catch(e) {
      console.warn('WakeLock unavailable:', e);
    }
  }
}

async function releaseWakeLock() {
  if (state.wakeLock) {
    await state.wakeLock.release();
    state.wakeLock = null;
  }
  document.getElementById('wakeIndicator').classList.remove('active');
  document.getElementById('wakeLabel').textContent = 'VEILLE';
}

// Re-acquire wake lock when page becomes visible again
document.addEventListener('visibilitychange', async () => {
  if (state.running && document.visibilityState === 'visible') {
    await acquireWakeLock();
  }
});

// ============================================================
// SPEECH
// ============================================================
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  u.rate = 1.0;
  u.pitch = 1.0;
  u.volume = 1.0;
  window.speechSynthesis.speak(u);
}

function buildAnnouncement() {
  const dist = Math.round(state.totalDistance);
  const elapsed = state.elapsedSec;
  const target = state.targetDistance;
  const totalTime = state.targetDurationSec;

  // Expected distance at this time
  const expectedDist = totalTime > 0 ? (elapsed / totalTime) * target : 0;
  const deltaM = dist - expectedDist;

  // Time delta
  const pace = totalTime / target; // sec per meter
  const deltaT = deltaM * pace; // positive = ahead

  const distStr = dist >= 1000
    ? `${(dist/1000).toFixed(2).replace('.',',')} kilomètres`
    : `${dist} mètres`;

  let deltaStr = '';
  if (Math.abs(deltaM) < 5) {
    deltaStr = 'vous êtes dans les temps';
  } else if (deltaM > 0) {
    deltaStr = `vous avez ${Math.round(deltaM)} mètres d'avance, soit ${fmtTimeSpeech(deltaT)} d'avance`;
  } else {
    deltaStr = `vous avez ${Math.round(-deltaM)} mètres de retard, soit ${fmtTimeSpeech(-deltaT)} de retard`;
  }

  return `Distance parcourue: ${distStr}. ${deltaStr}.`;
}

// ============================================================
// GPS
// ============================================================
function startGPS() {
  if (!navigator.geolocation) {
    showToast('GPS non disponible');
    return;
  }

  document.getElementById('gpsDot').className = 'status-dot gps-warn';

  state.watchId = navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude, longitude, accuracy, speed } = pos.coords;
      document.getElementById('gpsDot').className = 'status-dot gps-ok';
      document.getElementById('gpsAccuracy').textContent = `±${Math.round(accuracy)}m`;

      if (speed !== null) {
        document.getElementById('currentSpeed').textContent = `${(speed * 3.6).toFixed(1)} km/h`;
      }

      if (state.positions.length > 0) {
        const last = state.positions[state.positions.length - 1];
        const d = haversine(last.lat, last.lon, latitude, longitude);
        // Filter noise: only add if moved > 1m and accuracy reasonable
        if (d > 1 && accuracy < 50) {
          state.totalDistance += d;
          state.positions.push({ lat: latitude, lon: longitude });
          document.getElementById('gpsPoints').textContent = state.positions.length;
        }
      } else {
        state.positions.push({ lat: latitude, lon: longitude });
        document.getElementById('gpsPoints').textContent = state.positions.length;
      }
    },
    (err) => {
      document.getElementById('gpsDot').className = 'status-dot gps-err';
      document.getElementById('gpsAccuracy').textContent = 'Erreur';
      console.error('GPS error:', err);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }
  );
}

function stopGPS() {
  if (state.watchId !== null) {
    navigator.geolocation.clearWatch(state.watchId);
    state.watchId = null;
  }
  document.getElementById('gpsDot').className = 'status-dot';
}

// ============================================================
// TICK (every second)
// ============================================================
function tick() {
  state.elapsedSec = (Date.now() - state.startTime) / 1000;

  const dist = Math.round(state.totalDistance);
  const elapsed = state.elapsedSec;
  const target = state.targetDistance;
  const totalTime = state.targetDurationSec;

  // Expected distance
  const expectedDist = totalTime > 0 ? (elapsed / totalTime) * target : 0;
  const deltaM = dist - expectedDist;
  const pace = totalTime > 0 ? totalTime / target : 0;
  const deltaT = deltaM * pace;

  // Distance card
  document.getElementById('valDistance').innerHTML =
    dist >= 1000
      ? `${(dist/1000).toFixed(2)}<span class="metric-unit">km</span>`
      : `${dist}<span class="metric-unit">m</span>`;

  // Delta meters
  const cardM = document.getElementById('cardDeltaM');
  const valM = document.getElementById('valDeltaM');
  if (Math.abs(deltaM) < 5) {
    valM.innerHTML = `±0<span class="metric-unit">m</span>`;
    cardM.className = 'metric-card card-neutral';
  } else if (deltaM > 0) {
    valM.innerHTML = `+${Math.round(deltaM)}<span class="metric-unit">m</span>`;
    cardM.className = 'metric-card card-ahead';
  } else {
    valM.innerHTML = `${Math.round(deltaM)}<span class="metric-unit">m</span>`;
    cardM.className = 'metric-card card-behind';
  }

  // Delta time
  const cardT = document.getElementById('cardDeltaT');
  const valT = document.getElementById('valDeltaT');
  if (Math.abs(deltaT) < 3) {
    valT.innerHTML = `±0<span class="metric-unit">s</span>`;
    cardT.className = 'metric-card card-neutral';
  } else if (deltaT > 0) {
    valT.innerHTML = `+${fmtTime(deltaT)}<span class="metric-unit"></span>`;
    cardT.className = 'metric-card card-ahead';
  } else {
    valT.innerHTML = `-${fmtTime(-deltaT)}<span class="metric-unit"></span>`;
    cardT.className = 'metric-card card-behind';
  }

  // Elapsed / remaining
  document.getElementById('valElapsed').textContent = fmtTime(elapsed);
  const remaining = Math.max(0, totalTime - elapsed);
  document.getElementById('valRemaining').textContent = fmtTime(remaining);

  // Progress bar
  const pct = Math.min(100, (dist / target) * 100);
  document.getElementById('progressBar').style.width = pct.toFixed(1) + '%';
  document.getElementById('progressPct').textContent = pct.toFixed(0) + '%';

  // Announce countdown
  state.announceCountdown--;
  if (state.announceCountdown <= 0) {
    state.announceCountdown = state.timerInterval;
    const msg = buildAnnouncement();
    speak(msg);
  }
  document.getElementById('nextAnnounce').textContent = state.announceCountdown;

  // Auto-stop at end of time
  if (elapsed >= totalTime + 5) {
    // optionally auto-stop
  }
}

// ============================================================
// START / STOP
// ============================================================
async function startTracking() {
  const dist = parseFloat(document.getElementById('inputDistance').value);
  const durMin = parseInt(document.getElementById('inputDurMin').value) || 0;
  const durSec = parseInt(document.getElementById('inputDurSec').value) || 0;
  const timer = parseInt(document.getElementById('inputTimer').value) || 30;

  const totalSec = durMin * 60 + durSec;

  const errEl = document.getElementById('setupError');
  if (!dist || dist < 100) { errEl.textContent = 'Distance invalide (min 100m)'; errEl.style.display='block'; return; }
  if (totalSec < 10) { errEl.textContent = 'Durée invalide (min 10 secondes)'; errEl.style.display='block'; return; }
  if (timer < 5) { errEl.textContent = 'Timer invalide (min 5 secondes)'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';

  state.targetDistance = dist;
  state.targetDurationSec = totalSec;
  state.timerInterval = timer;
  state.startTime = Date.now();
  state.elapsedSec = 0;
  state.positions = [];
  state.totalDistance = 0;
  state.announceCountdown = timer;
  state.running = true;

  // UI switch
  document.getElementById('setupPanel').classList.add('hidden');
  document.getElementById('runningPanel').classList.add('active');

  // Wake lock
  await acquireWakeLock();

  // GPS
  startGPS();

  // Tick every second
  state.tickId = setInterval(tick, 1000);

  // Initial speech
  setTimeout(() => {
    speak(`Suivi démarré. Distance cible: ${dist >= 1000 ? (dist/1000) + ' kilomètres' : dist + ' mètres'}. Durée prévue: ${fmtTimeSpeech(totalSec)}. Annonces toutes les ${timer} secondes.`);
  }, 500);

  showToast('Tracking démarré ✓');
}

function stopTracking() {
  state.running = false;

  clearInterval(state.tickId);
  stopGPS();
  releaseWakeLock();

  window.speechSynthesis && window.speechSynthesis.cancel();

  // Final announcement
  const finalDist = Math.round(state.totalDistance);
  speak(`Tracking terminé. Distance totale parcourue: ${finalDist >= 1000 ? (finalDist/1000).toFixed(2).replace('.',',') + ' kilomètres' : finalDist + ' mètres'}.`);

  document.getElementById('setupPanel').classList.remove('hidden');
  document.getElementById('runningPanel').classList.remove('active');
  document.getElementById('gpsDot').className = 'status-dot';

  showToast(`Terminé — ${finalDist}m parcourus`, 4000);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  // Check speech synthesis
  if (!window.speechSynthesis) {
    showToast('Synthèse vocale non disponible', 4000);
  }

  // Prefill sensible defaults
  document.getElementById('inputDistance').value = 5000;
  document.getElementById('inputDurMin').value = 30;
  document.getElementById('inputDurSec').value = 0;
  document.getElementById('inputTimer').value = 30;

  // Unlock speech on first user interaction (iOS requirement)
  document.body.addEventListener('touchstart', () => {
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(u);
    }
  }, { once: true });
});
</script>
